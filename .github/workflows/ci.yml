name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-cook-dashboard:
    name: Build Cook Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cook-dashboard
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://aaixsytygsjilgvebnfv.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaXhzeXR5Z3NqaWxndmVibmZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTg0ODQsImV4cCI6MjA4ODA3NDQ4NH0.eN96IMG4nzxTlh1QjVCMD_ZP8VRAbD8ea3AFeQPnb7A
      NEXT_PUBLIC_API_URL: https://maase-api.railway.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/cook-dashboard/package-lock.json
      - run: npm install
      - run: npm run build

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/api/package-lock.json
      - run: npm install
      - run: npm run build
